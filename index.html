<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental & Beauty Albania – Risparmia fino al 70%</title>
  <style>
    :root {
      --green: #1a8b4a;
      --green-light: #3abf70;
      --gold: #d4a642;
      --dark: #111827;
      --gray: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--dark); background: #fff; }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    header img { height: 70px; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--green); }

    /* HERO */
    .hero {
      position: relative;
      min-height: 95vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.pexels.com/photos/3762408/pexels-photo-3762408.jpeg?auto=compress&cs=tinysrgb&w=1400');
      background-size: cover;
      background-position: center;
      filter: brightness(0.32);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 40px 20px;
      max-width: 820px;
      margin: 0 auto;
    }
    .hero-eyebrow {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-size: clamp(34px, 5vw, 62px);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--gold); }
    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: #e5e7eb;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .hero-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25d366;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(37,211,102,0.5);
      transition: transform 0.2s;
    }
    .btn-hero:hover { transform: translateY(-2px); }
    .hero-note { margin-top: 14px; font-size: 13px; color: #9ca3af; }

    /* SAVINGS BAR */
    .savings-bar {
      background: var(--green);
      padding: 26px 20px;
      display: flex;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
    }
    .savings-item { text-align: center; color: #fff; }
    .savings-number { font-size: 46px; font-weight: 800; color: var(--gold); line-height: 1; }
    .savings-label { font-size: 13px; margin-top: 4px; opacity: 0.9; }

    /* SEZIONI GENERALI */
    .section { padding: 70px 20px; max-width: 1100px; margin: 0 auto; }
    .section-bg { background: #f9fafb; padding: 70px 20px; }
    .section-bg-inner { max-width: 1100px; margin: 0 auto; }
    .section-title {
      text-align: center;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 800;
      color: var(--green);
      margin-bottom: 10px;
    }
    .section-sub {
      text-align: center;
      font-size: 16px;
      color: var(--gray);
      margin-bottom: 48px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    /* VANTAGGI */
    .vantaggi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }
    .vantaggio-card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 28px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .vantaggio-card:hover { transform: translateY(-5px); box-shadow: 0 18px 40px rgba(0,0,0,0.12); }
    .vantaggio-img { width: 100%; height: 210px; object-fit: cover; }
    .vantaggio-body { padding: 22px; }
    .vantaggio-icon { font-size: 34px; margin-bottom: 10px; }
    .vantaggio-number {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .vantaggio-title { font-size: 19px; font-weight: 700; color: var(--green); margin-bottom: 10px; }
    .vantaggio-text { font-size: 14px; color: var(--gray); line-height: 1.7; }

    /* TABELLA PREZZI */
    .prezzi-section { background: #f0fff6; padding: 70px 20px; }
    .prezzi-inner { max-width: 900px; margin: 0 auto; }
    .prezzo-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 15px; margin-top: 36px; border-radius: 16px; overflow: hidden; }
    .prezzo-table th { padding: 16px 18px; font-weight: 700; font-size: 16px; }
    .prezzo-table th:first-child { text-align: left; background: #fff; }
    .prezzo-table th:nth-child(2) { background: #fee2e2; color: #991b1b; text-align: center; }
    .prezzo-table th:nth-child(3) { background: var(--green); color: #fff; text-align: center; }
    .prezzo-table td { padding: 14px 18px; border-bottom: 1px solid #e5e7eb; }
    .prezzo-table td:first-child { font-weight: 600; background: #fff; }
    .prezzo-table td:nth-child(2) { background: #fff5f5; text-align: center; color: #991b1b; font-weight: 600; }
    .prezzo-table td:nth-child(3) { background: #f0fff6; text-align: center; color: var(--green); font-weight: 700; font-size: 16px; }
    .risparmio-badge {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
    }

    /* COME FUNZIONA */
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
      margin-top: 48px;
    }
    .step-card {
      text-align: center;
      padding: 28px 18px;
      background: #fff;
      border-radius: 22px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      transition: transform 0.2s;
    }
    .step-card:hover { transform: translateY(-4px); }
    .step-num {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .step-icon { font-size: 30px; margin-bottom: 10px; }
    .step-card h3 { font-size: 16px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
    .step-card p { font-size: 13px; color: var(--gray); line-height: 1.6; }

    /* TRATTAMENTI */
    .trattamenti-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }
    .trattamento-box {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 28px rgba(0,0,0,0.07);
    }
    .trattamento-img { width: 100%; height: 260px; object-fit: cover; }
    .trattamento-body { padding: 24px; }
    .trattamento-title { font-size: 22px; font-weight: 800; color: var(--green); margin-bottom: 16px; }
    .trattamento-list { list-style: none; }
    .trattamento-list li {
      font-size: 15px;
      color: var(--gray);
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .trattamento-list li:last-child { border-bottom: none; }
    .trattamento-list li::before { content: "✓"; color: var(--green); font-weight: 800; font-size: 16px; }

    /* PERCHÉ NOI */
    .perche-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
      margin-top: 10px;
    }
    .perche-card {
      background: #fff;
      border-radius: 18px;
      padding: 26px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .perche-icon { font-size: 36px; flex-shrink: 0; }
    .perche-body h3 { font-size: 17px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    .perche-body p { font-size: 14px; color: var(--gray); line-height: 1.6; }

    /* TESTIMONIANZE */
    .testi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .testi-card {
      background: #fff;
      border-radius: 20px;
      padding: 26px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }
    .testi-stars { color: var(--gold); font-size: 20px; margin-bottom: 12px; }
    .testi-text { font-size: 15px; color: var(--gray); line-height: 1.7; margin-bottom: 16px; font-style: italic; }
    .testi-author { display: flex; align-items: center; gap: 12px; }
    .testi-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
    }
    .testi-name { font-weight: 700; font-size: 14px; color: var(--dark); }
    .testi-city { font-size: 12px; color: var(--gray); }

    /* FAQ */
    .faq-list { max-width: 780px; margin: 0 auto; }
    .faq-item {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      margin-bottom: 12px;
      overflow: hidden;
    }

      padding: 18px 22px;
      font-
