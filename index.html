<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental & Beauty Albania – Risparmia fino al 70%</title>
  <meta name="description" content="Trattamenti dentali ed estetica del viso in Albania. Risparmia fino al 70% rispetto all'Italia con assistenza italiana completa." />
  <style>
    :root {
      --green: #1a8b4a;
      --green-light: #3abf70;
      --gold: #d4a642;
      --dark: #111827;
      --gray: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--dark);
      background: #fff;
    }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header img { height: 60px; }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--green);
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.pexels.com/photos/3762408/pexels-photo-3762408.jpeg?auto=compress&cs=tinysrgb&w=1400');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 40px 20px;
      max-width: 780px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero h1 span {
      color: var(--gold);
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: #e5e7eb;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25d366;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(37,211,102,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-hero:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(37,211,102,0.55);
    }

    .hero-note {
      margin-top: 14px;
      font-size: 13px;
      color: #9ca3af;
    }

    /* NUMERO RISPARMIO */
    .savings-bar {
      background: var(--green);
      padding: 22px 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .savings-item {
      text-align: center;
      color: #fff;
    }

    .savings-number {
      font-size: 42px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }

    .savings-label {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.9;
    }

    /* VANTAGGI */
    .section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 800;
      color: var(--green);
      margin-bottom: 10px;
    }

    .section-sub {
      text-align: center;
      font-size: 16px;
      color: var(--gray);
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .vantaggi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .vantaggio-card {
      background: #f9fafb;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .vantaggio-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.12);
    }

    .vantaggio-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .vantaggio-body {
      padding: 20px;
    }

    .vantaggio-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .vantaggio-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
    }

    .vantaggio-number {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .vantaggio-text {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.6;
    }

    /* CONFRONTO PREZZI */
    .prezzi-section {
      background: #f0fff6;
      padding: 60px 20px;
    }

    .prezzi-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .prezzi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 36px;
    }

    .prezzo-row-header {
      display: contents;
    }

    .prezzo-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 15px;
    }

    .prezzo-table th {
      padding: 14px 16px;
      font-weight: 700;
      font-size: 16px;
    }

    .prezzo-table th:first-child { text-align: left; }
    .prezzo-table th:nth-child(2) { background: #fee2e2; color: #991b1b; border-radius: 12px 12px 0 0; text-align: center; }
    .prezzo-table th:nth-child(3) { background: var(--green); color: #fff; border-radius: 12px 12px 0 0; text-align: center; }

    .prezzo-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .prezzo-table td:first-child { font-weight: 500; color: var(--dark); }
    .prezzo-table td:nth-child(2) { background: #fff5f5; text-align: center; color: #991b1b; font-weight: 600; }
    .prezzo-table td:nth-child(3) { background: #f0fff6; text-align: center; color: var(--green); font-weight: 700; }

    .prezzo-table tr:last-child td:nth-child(2) { border-radius: 0 0 0 0; }
    .prezzo-table tr:last-child td:nth-child(3) { border-radius: 0 0 12px 0; }

    .risparmio-badge {
      display: inline-block;
      background: var(--gold);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
    }

    /* COME FUNZIONA */
    .steps-section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 36px;
    }

    .step-card {
      text-align: center;
      padding: 24px 16px;
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .step-num {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .step-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 6px;
    }

    .step-card p {
      font-size: 13px;
      color: var(--gray);
    }

    /* CTA FINALE */
    .cta-final {
      background: linear-gradient(135deg, var(--green), var(--green-light));
      padding: 70px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-final::before {
      content: "";
      position: absolute;
      top: -60px;
      left: -60px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .cta-final::after {
      content: "";
      position: absolute;
      bottom: -80px;
      right: -40px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .cta-final h2 {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    .cta-final p {
      font-size: 17px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    .btn-cta-final {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: var(--green);
      font-size: 18px;
      font-weight: 800;
      padding: 18px 40px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      position: relative;
      z-index: 2;
    }

    .btn-cta-final:hover { transform: translateY(-2px); }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: #9ca3af;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }

    /* WHATSAPP FLOATING */
    .wa-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
    }

    .wa-float a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      background: #25d366;
      border-radius: 50%;
      box-shadow: 0 8px 24px rgba(37,211,102,0.5);
      font-size: 34px;
      color: #fff;
      transition: transform 0.2s;
    }

    .wa-float a:hover { transform: scale(1.1); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .vantaggi-grid,
      .steps-grid {
        grid-template-columns: 1fr;
      }

      .prezzi-grid {
        grid-template-columns: 1fr;
      }

      .savings-bar {
        gap: 24px;
      }

      .prezzo-table {
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .header-title { font-size: 16px; }
      header img { height: 46px; }
